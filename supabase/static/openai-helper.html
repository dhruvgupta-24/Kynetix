<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kynetix &#x2014; OpenAI Connection</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #13131F;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .card {
      background: #1E1E2C;
      border: 1px solid #2E2E3E;
      border-radius: 24px;
      padding: 36px 28px;
      max-width: 420px;
      width: 100%;
      text-align: center;
    }
    .icon { font-size: 40px; margin-bottom: 16px; }
    h1 { font-size: 20px; font-weight: 800; margin-bottom: 8px; color: #ffffff; }
    .subtitle { color: #9CA3AF; font-size: 14px; line-height: 1.5; margin-bottom: 28px; }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid #2E2E3E;
      border-top-color: #52B788;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #status-text { font-size: 13px; color: #6B7280; min-height: 20px; margin-bottom: 20px; }
    #return-btn {
      display: none;
      background: #52B788;
      color: #ffffff;
      border: none;
      border-radius: 14px;
      padding: 14px 24px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      width: 100%;
      margin-top: 8px;
    }
    #return-btn:active { opacity: 0.85; }
    #success-icon { display: none; font-size: 36px; margin-bottom: 12px; }
    .error-box {
      display: none;
      background: rgba(255,107,53,0.1);
      border: 1px solid rgba(255,107,53,0.35);
      border-radius: 12px;
      padding: 14px;
      margin-top: 16px;
      color: #FF8A65;
      font-size: 13px;
      line-height: 1.6;
      text-align: left;
      word-break: break-word;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon" id="main-icon">&#x1F517;</div>
    <div id="success-icon">&#x2705;</div>
    <h1 id="main-title">Connecting to OpenAI</h1>
    <p class="subtitle" id="main-sub">Setting up your device login. This takes just a moment.</p>
    <div class="spinner" id="spinner"></div>
    <div id="status-text">Starting...</div>
    <button id="return-btn" onclick="doReturn()">Return to Kynetix</button>
    <div class="error-box" id="error-box"></div>
  </div>

  <script>
    (function () {
      // ── Config: read from URL params, never hardcoded ─────────────────────
      var params    = new URLSearchParams(window.location.search);
      var NONCE     = params.get('nonce');
      var API_BASE  = params.get('api') || 'https://sjrcqvqhycxtwwbivizy.supabase.co';
      var SAVE_URL  = API_BASE + '/functions/v1/openai-link-save';

      // ── OpenAI device authorization ───────────────────────────────────────
      // CLIENT_ID for ChatGPT operator/connector flow.
      // Endpoint: Auth0-hosted OpenAI authorization server.
      // NOTE: if auth.openai.com/oauth/device/code returns 404, the CLIENT_ID
      // is invalid or the device-code grant has been disabled for this client.
      // Check https://platform.openai.com or your app registration.
      var CLIENT_ID = 'app_EMoamEEZ73f0CkXaXp7hrann';
      var SCOPE = 'openid profile email offline_access model.request model.read organization.read';
      // ^ scope updated: "api.connectors.*" scopes were ChatGPT-plugin era and are now deprecated.
      //   Use platform scopes instead. If your CLIENT_ID requires specific scopes, adjust here.

      var deepLink  = '';

      // ── Helpers ───────────────────────────────────────────────────────────
      function setStatus(msg) {
        document.getElementById('status-text').textContent = msg;
      }
      function showSuccess(link) {
        document.getElementById('spinner').style.display    = 'none';
        document.getElementById('main-icon').style.display  = 'none';
        document.getElementById('success-icon').style.display = 'block';
        document.getElementById('main-title').textContent   = 'All set!';
        document.getElementById('main-sub').textContent     = 'Returning you to Kynetix now\u2026';
        setStatus('If the app did not open automatically, tap the button below.');
        document.getElementById('return-btn').style.display = 'block';
        document.getElementById('return-btn').setAttribute('data-href', link);
      }
      function showError(msg) {
        document.getElementById('spinner').style.display = 'none';
        var box = document.getElementById('error-box');
        box.style.display = 'block';
        box.textContent = msg;
        setStatus('Something went wrong. Close this tab and try again in Kynetix.');
      }
      function doReturn() {
        var btn  = document.getElementById('return-btn');
        var link = btn.getAttribute('data-href') || deepLink;
        if (link) { window.location.href = link; }
      }

      // ── Main flow ─────────────────────────────────────────────────────────
      async function run() {
        // Guard: session token must be present
        if (!NONCE) {
          showError('Missing session token (?nonce=). Return to Kynetix and try again.');
          return;
        }

        try {
          // ── Step 1: Request device code from OpenAI ──────────────────────
          setStatus('Requesting device code from OpenAI\u2026');

          var deviceRes = await fetch('https://auth.openai.com/oauth/device/code', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: 'client_id=' + encodeURIComponent(CLIENT_ID)
                + '&scope='     + encodeURIComponent(SCOPE)
          });

          var rawBody = await deviceRes.text();

          if (!deviceRes.ok) {
            // Surface the full raw error so it's debuggable — not swallowed.
            showError(
              'OpenAI device-code request failed.\n'
              + 'Status: ' + deviceRes.status + '\n'
              + 'Body: '   + rawBody
            );
            return;
          }

          var data;
          try { data = JSON.parse(rawBody); }
          catch (_) { showError('OpenAI returned non-JSON: ' + rawBody); return; }

          var deviceCode    = data.device_code   || data.device_auth_id;
          var userCode      = data.user_code;
          var verificationUri = data.verification_uri || data.verification_url || 'https://chatgpt.com/auth/device';
          var interval      = data.interval       || data.interval_seconds || 5;
          var expiresIn     = data.expires_in     || 1800;
          var expiresAt     = data.expires_at     || new Date(Date.now() + expiresIn * 1000).toISOString();

          if (!deviceCode || !userCode) {
            showError('Unexpected OpenAI response (missing device_code / user_code):\n' + rawBody);
            return;
          }

          // ── Step 2: Save session to Supabase via nonce ───────────────────
          setStatus('Saving your session\u2026');

          var saveRes = await fetch(SAVE_URL, {
            method:  'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              nonce:            NONCE,
              device_code:      deviceCode,
              user_code:        userCode,
              verification_url: verificationUri,
              interval_seconds: interval,
              expires_at:       expiresAt
            })
          });

          if (!saveRes.ok) {
            var saveBody = await saveRes.text();
            showError('Could not save session (status ' + saveRes.status + '):\n' + saveBody);
            return;
          }

          // ── Step 3: Deep-link back into app ──────────────────────────────
          deepLink = 'kynetix://openai-auth/callback'
            + '?user_code='       + encodeURIComponent(userCode)
            + '&verification_uri=' + encodeURIComponent(verificationUri)
            + '&interval='         + interval;

          showSuccess(deepLink);

          // Auto-redirect (Android may block without user gesture → button fallback above)
          setTimeout(function () { window.location.href = deepLink; }, 300);

        } catch (e) {
          showError((e && e.message) ? e.message : String(e));
        }
      }

      run();
    })();
  </script>
</body>
</html>
